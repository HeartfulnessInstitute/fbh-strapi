version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: forest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: strapi
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi123
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - strapi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d strapi"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Strapi Application
  strapi:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: forest-strapi
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      # Database configuration
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi123
      DATABASE_SSL: false
      
      # Strapi configuration
      HOST: 0.0.0.0
      PORT: 1337
      NODE_ENV: development
      
      # You'll need to add these from your existing .env
      APP_KEYS: ${APP_KEYS:-defaultkey1,defaultkey2,defaultkey3,defaultkey4}
      JWT_SECRET: ${JWT_SECRET:-defaultjwtsecret}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-defaultapisalt}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-defaultadminjwt}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-defaulttransfersalt}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./config:/app/config
      - ./public:/app/public
      - ./.env:/app/.env
      # Exclude node_modules
      - /app/node_modules
    networks:
      - strapi-network

# Named volumes
volumes:
  postgres_data:
    driver: local

# Networks
networks:
  strapi-network:
    driver: bridge